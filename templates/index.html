<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terrerath Badger Watch</title>
    <style>
        body {
            font-family: 'Open Sans', sans-serif; /* A modern, readable font */
            margin: 0;
            padding: 0;
            background-color: #f8f8f8; /* Very light grey */
            color: #333;
            line-height: 1.6;
        }
        .header {
            background-color: #1a1a1a; /* Dark header */
            color: #ffffff;
            padding: 20px 0;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            margin-bottom: 30px;
        }
        .header h1 {
            margin: 0;
            font-size: 3em;
            letter-spacing: 2px;
        }
        .container {
            max-width: 960px;
            margin: 0 auto;
            padding: 0 20px;
        }
        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); /* Responsive grid, slightly larger min width */
            gap: 30px;
            padding-bottom: 40px;
        }
        .video-container {
            background-color: #ffffff;
            border: 1px solid #e0e0e0;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s ease-in-out, box-shadow 0.3s ease-in-out;
            display: flex; /* Use flexbox for layout */
            flex-direction: column; /* Stack items vertically */
            justify-content: space-between; /* Push footer to bottom */
        }
        .video-container:hover {
            transform: translateY(-8px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
        }
        .video-embed {
            position: relative;
            padding-bottom: 56.25%; /* 16:9 aspect ratio */
            height: 0;
            overflow: hidden;
            max-width: 100%;
            background: #000;
            margin-bottom: 15px; /* Space between video and datetime */
            border-radius: 6px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .video-embed video { /* Changed from iframe to video */
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }
        .video-datetime {
            text-align: center;
            font-size: 1em;
            color: #555;
            padding-top: 10px;
            border-top: 1px solid #f0f0f0;
            font-weight: bold;
        }
        .footer {
            text-align: center;
            padding: 20px;
            margin-top: 40px;
            background-color: #1a1a1a;
            color: #d0d0d0;
            font-size: 0.9em;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="header">
        <h1><span style="font-size: 1.1em;">🦡</span> Terrerath Badger Watch <span style="font-size: 1.1em;">🦡</span></h1>
    </div>

    <div class="container">
        <div class="video-grid">

            {% for video in videos %}
            <div class="video-container">
                <div class="video-embed">
                    <video controls preload="metadata" style="width: 100%; height: 100%;">
                        <source src="{{ video.embed_url }}" type="video/mp4">
                        Your browser does not support the video tag.
                    </video>
                </div>
                <p class="video-datetime">{{ video.datetime }}</p>
            </div>
            {% endfor %}
        </div>
    </div>

    <div class="footer">
        <p>&copy; 2026 Terrerath Badger Watch. All rights reserved.</p>
    </div>
</body>
</html>
