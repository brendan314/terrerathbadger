<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terrerath Badger Watch</title>
    <style>
        body {
            font-family: 'Open Sans', sans-serif; /* A modern, readable font */
            margin: 0;
            padding: 0;
            background-color: #f8f8f8; /* Very light grey */
            color: #333;
            line-height: 1.6;
        }
        .header {
            background-color: #1a1a1a; /* Dark header */
            color: #ffffff;
            padding: 20px 0;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            margin-bottom: 30px;
        }
        .header h1 {
            margin: 0;
            font-size: 3em;
            letter-spacing: 2px;
        }
        .container {
            max-width: 1200px; /* Wider container for timeline */
            margin: 0 auto;
            padding: 0 20px;
        }
        /* Timeline specific styles */
        .timeline {
            position: relative;
            margin: 50px 0;
            padding: 0;
            list-style: none;
        }
        .timeline::before {
            content: '';
            position: absolute;
            top: 0;
            bottom: 0;
            left: 50%;
            width: 4px;
            background: #e0e0e0;
            margin-left: -2px;
            z-index: 0;
        }
        .timeline-item {
            margin-bottom: 50px;
            position: relative;
        }
        .timeline-item:last-child {
            margin-bottom: 0;
        }
        .timeline-item::before { /* Circle on the timeline */
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            background: #555;
            border: 4px solid #f8f8f8;
            border-radius: 50%;
            left: 50%;
            top: 15px;
            margin-left: -12px;
            z-index: 1;
        }
        .timeline-content {
            background-color: #ffffff;
            border: 1px solid #e0e0e0;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            position: relative;
            width: 45%; /* Content width */
            text-align: right; /* Default text alignment */
            transition: transform 0.3s ease-in-out, box-shadow 0.3s ease-in-out;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .timeline-content:hover {
            transform: translateY(-8px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
        }
        .timeline-content::after { /* Arrow for content box */
            content: '';
            position: absolute;
            top: 22px;
            width: 0;
            height: 0;
            border-style: solid;
            border-width: 10px 0 10px 10px;
            border-color: transparent transparent transparent #ffffff;
            right: -10px;
        }

        /* Positioning for left and right timeline items */
        .timeline-item:nth-child(even) .timeline-content {
            margin-left: 55%; /* Push even items to the right side */
            text-align: left;
        }
        .timeline-item:nth-child(even) .timeline-content::after {
            left: -10px;
            border-width: 10px 10px 10px 0;
            border-color: transparent #ffffff transparent transparent;
        }
        .timeline-date {
            position: absolute;
            width: 10%; /* Date width */
            top: 25px;
            font-size: 1.1em;
            font-weight: bold;
            color: #555;
            text-align: center;
        }
        .timeline-item:nth-child(odd) .timeline-date {
            left: 0;
        }
        .timeline-item:nth-child(even) .timeline-date {
            right: 0;
        }

        .video-embed {
            position: relative;
            padding-bottom: 56.25%; /* 16:9 aspect ratio */
            height: 0;
            overflow: hidden;
            max-width: 100%;
            background: #000;
            margin-bottom: 15px;
            border-radius: 6px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .video-embed video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }
        .footer {
            text-align: center;
            padding: 20px;
            margin-top: 40px;
            background-color: #1a1a1a;
            color: #d0d0d0;
            font-size: 0.9em;
        }

        /* Responsive adjustments */
        @media (max-width: 768px) {
            .timeline::before {
                left: 20px; /* Move timeline to the left */
            }
            .timeline-item::before {
                left: 20px; /* Move circle to the left */
                margin-left: -12px;
            }
            .timeline-content,
            .timeline-item:nth-child(even) .timeline-content {
                width: calc(100% - 70px); /* Adjust width for smaller screens */
                margin-left: 70px; /* Make space for timeline line and date */
                text-align: left;
            }
            .timeline-content::after { /* Adjust arrow position for all content boxes */
                left: -10px;
                border-width: 10px 10px 10px 0;
                border-color: transparent #ffffff transparent transparent;
            }
            .timeline-date,
            .timeline-item:nth-child(even) .timeline-date {
                width: 50px; /* Smaller date width */
                left: 70px; /* Position date next to content */
                text-align: left;
                top: 0; /* Position date at the top of the item */
                font-size: 0.9em; /* Smaller font size for date */
                transform: translateX(-100%); /* Move date to the left of the content */
                white-space: nowrap; /* Prevent date from wrapping */
            }
            .timeline-date {
                font-size: 0.9em;
                padding-top: 5px;
            }
            .header h1 {
                font-size: 2em; /* Smaller header on mobile */
            }
        }
        @media (max-width: 480px) {
            .header h1 {
                font-size: 1.5em; /* Even smaller header on very small screens */
            }
            .timeline-date {
                font-size: 0.8em;
                padding-top: 8px;
            }
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="header">
        <h1><span style="font-size: 1.1em;">🦡</span> Terrerath Badger Watch <span style="font-size: 1.1em;">🦡</span></h1>
    </div>

    <div class="container">
        <ul class="timeline">
            {% for video in videos %}
            <li class="timeline-item">
                <div class="timeline-date">{{ video.display_datetime }}</div>
                <div class="timeline-content">
                    <div class="video-embed">
                        <video controls preload="metadata" style="width: 100%; height: 100%;">
                            <source src="{{ video.embed_url }}" type="video/mp4">
                            Your browser does not support the video tag.
                        </video>
                    </div>
                </div>
            </li>
            {% endfor %}
        </ul>
    </div>

    <div class="footer">
        <p>&copy; 2026 Terrerath Badger Watch. All rights reserved.</p>
    </div>
</body>
</html>
